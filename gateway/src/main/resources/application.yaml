server:
  port: 9000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/users/**

            - id: asset-service
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/assets/**

            - id: loot-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/loot/**

            - id: rng-service
              uri: http://localhost:8096
              predicates:
                - Path=/api/dice/**

            - id: wiki-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/wiki/**

            - id: character-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/personajes/**

            - id: compendium-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/compendium/**

            - id: log-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/logs/**

            - id: notification-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/notifications/**

            - id: map-service
              uri: http://localhost:8097
              predicates:
                - Path=/api/v1/maps/**
